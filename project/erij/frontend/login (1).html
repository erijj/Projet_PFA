<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartCert — Connexion</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="stylelog.css" rel="stylesheet">
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <div class="login-card">
    <img class="logo-img" src="logo.png">     
    <div class="login-brand">SmartCert</div>
    <div class="alert-custom" id="alert-error">
      <i class="fas fa-circle-exclamation me-1"></i>
      <span id="alert-msg">Identifiants incorrects.</span>
    </div>

    <form onsubmit="handleLogin(event)">
      <label class="form-label">Adresse email</label>
      <div class="input-wrapper">
        <i class="fas fa-envelope input-icon"></i>
        <input type="email" class="form-control-custom" id="email-input" placeholder="exemple@iset.tn" required>
      </div>
      <label class="form-label">Mot de passe</label>
      <div class="input-wrapper">
        <i class="fas fa-lock input-icon"></i>
        <input type="password" class="form-control-custom" id="pw-input" placeholder="••••••••" required>
        <button type="button" class="toggle-pw" onclick="togglePw()"><i class="fas fa-eye" id="pw-eye"></i></button>
      </div>
      <button type="submit" class="btn-login" id="login-btn">
        <i class="fas fa-arrow-right-to-bracket me-2"></i>Se connecter
      </button>
    </form>

    <div class="divider"><span>SmartCert · Blockchain Certifications</span></div>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left me-1"></i> Retour à l'accueil</a>
  </div>

  <script>
    let currentRole = 'admin';
    function switchRole(role) {
      currentRole = role;
      document.getElementById('tab-admin').classList.toggle('active', role==='admin');
      document.getElementById('tab-etudiant').classList.toggle('active', role==='etudiant');
      document.getElementById('alert-error').style.display = 'none';
    }
    function togglePw() {
      const i = document.getElementById('pw-input'), e = document.getElementById('pw-eye');
      i.type = i.type==='password' ? 'text' : 'password';
      e.className = i.type==='text' ? 'fas fa-eye-slash' : 'fas fa-eye';
    }
    function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Connexion...';
      btn.disabled = true;
      setTimeout(() => {
        const email = document.getElementById('email-input').value;
        const pw = document.getElementById('pw-input').value;
        const comptes = {
          admin:    {email:'admin@smartcert.tn',    pw:'admin123',    redirect:'dashboard-admin.html'},
          etudiant: {email:'etudiant@smartcert.tn', pw:'etudiant123', redirect:'dashboard-etudiant.html'}
        };
        const c = comptes[currentRole];
        if (email===c.email && pw===c.pw) {
          btn.innerHTML = '<i class="fas fa-circle-check me-2"></i>Connecté !';
          btn.style.background = 'linear-gradient(135deg,#059669,#10B981)';
          setTimeout(() => window.location.href = c.redirect, 800);
        } else {
          document.getElementById('alert-error').style.display = 'block';
          document.getElementById('alert-msg').textContent = 'Identifiants incorrects. Démo : ' + c.email + ' / ' + c.pw;
          btn.innerHTML = '<i class="fas fa-arrow-right-to-bracket me-2"></i>Se connecter';
          btn.disabled = false;
        }
      }, 1200);
    }
  </script>
</body>
</html>
